<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora JS</title>
    <style>
      body { font-family: sans-serif; margin: 2rem; }
      .calc { max-width: 360px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      input[type="text"] { grid-column: span 4; font-size: 1.2rem; padding: .5rem; }
      button { padding: .75rem; font-size: 1rem; }
      .wide { grid-column: span 2; }
    </style>
  </head>
  <body>
    <h1>Calculadora JS</h1>
    <div class="calc">
      <input id="display" type="text" readonly />
      <button data-k="7">7</button>
      <button data-k="8">8</button>
      <button data-k="9">9</button>
      <button data-k="/">/</button>
      <button data-k="4">4</button>
      <button data-k="5">5</button>
      <button data-k="6">6</button>
      <button data-k="*">*</button>
      <button data-k="1">1</button>
      <button data-k="2">2</button>
      <button data-k="3">3</button>
      <button data-k="-">-</button>
      <button class="wide" data-k="0">0</button>
      <button data-k=".">.</button>
      <button data-k="+">+</button>
      <button class="wide" id="clear">C</button>
      <button class="wide" id="equals">=</button>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
