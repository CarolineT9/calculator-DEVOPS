name: CI - Calculator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-infra-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Instalar dependências
      - name: Install dependencies
        run: npm install

      # 4️⃣ Rodar testes
      - name: Run tests
        run: npm test

      # 5️⃣ Configurar credenciais AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      # 6️⃣ Instalar Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 7️⃣ Terraform Init
      - name: Terraform Init
        working-directory: infra
        run: terraform init

      # 8️⃣ Terraform Validate
      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      # 9️⃣ Terraform Apply
      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      # 🔟 Build da imagem Docker
      - name: Build Docker image
        run: docker build -t calculator-app .

      # 1️⃣1️⃣ Rodar container (teste simples)
      - name: Run Docker container
        run: docker run -d -p 8080:80 calculator-app

      # 1️⃣2️⃣ Esperar subir (ESSENCIAL)
      - name: Wait for container
        run: sleep 5

      # 1️⃣3️⃣ Testar se subiu
      - name: Test container
        run: curl http://localhost:8080