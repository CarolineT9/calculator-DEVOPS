name: CI - Calculator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    #checkout do codigo, setup do node, install das dependencias e rodar os testes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # 2. Configuração do AWS CLI
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1 # Altere para a sua região da AWS

      # 3. Enviar os arquivos para o S3
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://disciplina-devops-puc/ --exclude ".git/*" --delete --exact-timestamps
        
        # --delete remove arquivos antigos no S3 que não existem mais no repositório

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
