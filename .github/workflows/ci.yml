name: CI - Calculator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-infra-deploy:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      
      - name: Install dependencies
        run: npm install

      
      - name: Run tests
        run: npm test

      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      
      - name: Terraform Init
        working-directory: infra
        run: terraform init

      
      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Import existing S3 bucket
        working-directory: infra
        run: terraform import aws_s3_bucket.calculator_bucket disciplina-devops-caroline-b2 || true

      - name: Import existing ECR repository
        working-directory: infra
        run: terraform import aws_ecr_repository.calculator calculator-app || true

      - name: Import existing ECS cluster
        working-directory: infra
        run: terraform import aws_ecs_cluster.calculator calculator-cluster || true

      - name: Import existing CloudWatch log group
        working-directory: infra
        run: terraform import aws_cloudwatch_log_group.calculator /ecs/calculator || true

      - name: Import existing IAM role
        working-directory: infra
        run: terraform import aws_iam_role.ecs_task_execution_role ecs-task-execution-role-calculator || true

      - name: Import existing security group
        working-directory: infra
        run: |
          SG_ID=$(aws ec2 describe-security-groups --group-names ecs-security-group --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
          if [ -n "$SG_ID" ]; then
            terraform import aws_security_group.ecs $SG_ID || true
          fi

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -refresh=true

      - name: Get Terraform Outputs
        working-directory: infra
        id: terraform
        run: |
          echo "ecr_repo=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image for ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: calculator-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: calculator-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ steps.terraform.outputs.ecs_cluster }} \
            --service ${{ steps.terraform.outputs.ecs_service }} \
            --force-new-deployment
      
      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      
      - name: Build and run with Docker Compose
        run: docker compose up -d

      - name: Wait for container
        run: sleep 5

      - name: Test container
        run: curl http://localhost:8080

      - name: Clean up containers
        run: docker compose down

      - name: Deploy to S3
        run: aws s3 sync src/ s3://disciplina-devops-caroline-b2/ --delete